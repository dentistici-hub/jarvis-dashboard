<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #db6d28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 16px; font-size: 14px; line-height: 1.5; }
  h1 { font-size: 18px; font-weight: 600; }
  .header { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .header .sub { color: var(--dim); font-size: 12px; }
  .generated { color: var(--dim); font-size: 11px; background: var(--surface); padding: 4px 10px; border-radius: 4px; }

  .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; text-align: center; min-width: 80px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-title .count { color: var(--dim); font-weight: 400; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--dim); font-weight: 500; padding: 5px 6px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px; }
  td { padding: 5px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .tag-released { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-pending { background: rgba(139,148,158,0.15); color: var(--dim); }
  .tag-fire { background: rgba(248,81,73,0.25); color: var(--red); font-weight: 700; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .tag-long { color: var(--green); font-weight: 600; }
  .tag-short { color: var(--red); font-weight: 600; }
  .tag-high { color: var(--red); }
  .tag-medium { color: var(--yellow); }
  .tag-pre { color: var(--orange); font-size: 11px; }
  .asset-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin: 1px; background: rgba(88,166,255,0.1); color: var(--accent); }

  .news-group { margin-bottom: 12px; }
  .news-asset { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .news-asset .cnt { color: var(--dim); font-weight: 400; font-size: 12px; }
  .news-item { padding: 2px 0; font-size: 13px; }
  .news-item a { color: var(--dim); text-decoration: none; }
  .news-item a:hover { color: var(--accent); text-decoration: underline; }
  .news-src { color: #484f58; font-size: 10px; }
  .news-more { color: var(--dim); font-size: 12px; font-style: italic; }

  .thesis-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .thesis-row:last-child { border-bottom: none; }
  .thesis-name { font-weight: 500; }
  .thesis-meta { color: var(--dim); font-size: 11px; }
  .thesis-cot { font-weight: 600; font-size: 13px; }

  .section-label { color: var(--dim); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 8px 0 4px; border-bottom: 1px dashed var(--border); margin-bottom: 4px; }

  .empty { color: var(--dim); font-style: italic; padding: 8px 0; font-size: 13px; }

  /* Mobile */
  @media (max-width: 700px) {
    body { padding: 10px; font-size: 13px; }
    .stat { min-width: 60px; padding: 8px 10px; }
    .stat-val { font-size: 16px; }
    table { font-size: 12px; }
    td, th { padding: 4px; }
    .overflow-x { overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>JARVIS INTELLIGENCE</h1>
    <div class="sub" id="timestamp"></div>
  </div>
  <div class="generated" id="gen-time"></div>
</div>

<div class="stats" id="stats"></div>

<!-- Events -->
<div class="card">
  <div class="card-title">Scheduled Events <span class="count" id="event-count"></span></div>
  <div class="overflow-x">
    <table><thead><tr><th></th><th>Event</th><th>Date / Time</th><th>F</th><th>A</th><th>P</th><th>Assets</th></tr></thead>
    <tbody id="events-body"></tbody></table>
  </div>
  <div class="empty" id="events-empty" style="display:none;">No tracked events this week.</div>
</div>

<!-- Scores -->
<div class="card" id="scores-card">
  <div class="card-title">Surprise Scores</div>
  <div class="overflow-x">
    <table><thead><tr><th>Event</th><th>Asset</th><th>Dir</th><th>Delta</th><th>Score</th></tr></thead>
    <tbody id="scores-body"></tbody></table>
  </div>
  <div class="empty" id="scores-empty">No released events to score yet.</div>
</div>

<!-- Thesis -->
<div class="card">
  <div class="card-title">Asset Positioning</div>
  <div id="thesis-body"></div>
</div>

<!-- News -->
<div class="card">
  <div class="card-title">Breaking News <span class="count" id="news-count"></span></div>
  <div id="news-body"></div>
  <div class="empty" id="news-empty" style="display:none;">No headlines.</div>
</div>

<!-- Unmatched -->
<div class="card" id="unmatched-card" style="display:none;">
  <div class="card-title">Unmatched High-Impact <span class="count" id="unmatched-count"></span></div>
  <div class="overflow-x">
    <table><thead><tr><th>Country</th><th>Event</th><th>Date</th><th>Time</th></tr></thead>
    <tbody id="unmatched-body"></tbody></table>
  </div>
</div>

      const group = e.date === today ? 'TODAY' : e.date > today ? 'UPCOMING' : 'PAST';
      let label = '';
      if (group !== lastGroup) { lastGroup = group; label = '<tr><td colspan="7"><div class="section-label">' + group + '</div></td></tr>'; }
      const st = e.has_actual ? '<span class="tag tag-released">DONE</span>' : '<span class="tag tag-pending">WAIT</span>';
      const assets = e.assets.map(a => '<span class="asset-tag">' + a.replace('_',' ') + '</span>').join('');
      const pre = e.pre_event ? ' <span class="tag-pre">[pre]</span>' : '';
      return label + '<tr><td>' + st + '</td><td>' + e.country + ' ' + esc(e.title) + pre + '</td><td style="white-space:nowrap">' + e.date + ' ' + e.time + '</td><td>' + esc(e.forecast) + '</td><td><b>' + esc(e.actual) + '</b></td><td>' + esc(e.previous) + '</td><td>' + assets + '</td></tr>';
    }).join('');
  }

  // Scores
  const sb = document.getElementById('scores-body');
  const se = document.getElementById('scores-empty');
  if (d.scores.length) {
    se.style.display = 'none';
    sb.innerHTML = d.scores.map(s => {
      const dc = s.direction === 'LONG' ? 'tag-long' : 'tag-short';
      const f  = s.fire ? ' <span class="tag tag-fire">FIRE</span>' : '';
      return '<tr><td>' + esc(s.event).substring(0,35) + '</td><td>' + esc(s.asset) + '</td><td class="' + dc + '">' + s.direction + '</td><td>' + (s.delta>0?'+':'') + s.delta + '</td><td>' + s.score + '/' + s.threshold + f + '</td></tr>';
    }).join('');
  } else { se.style.display = ''; sb.innerHTML = ''; }

  // Thesis
  document.getElementById('thesis-body').innerHTML = d.thesis.map(t => {
    const c = t.cot_dir === 'LONG' ? 'var(--green)' : t.cot_dir === 'SHORT' ? 'var(--red)' : 'var(--dim)';
    const z = t.cot_z != null ? ' (Z=' + t.cot_z + ')' : '';
    return '<div class="thesis-row"><div><span class="thesis-name">' + esc(t.name) + '</span> <span class="thesis-meta">Tier ' + t.tier + ' / ' + t.cluster + '</span></div><div class="thesis-cot" style="color:' + c + '">' + t.cot_dir.toUpperCase() + z + '</div></div>';
  }).join('');

  // News
  document.getElementById('news-count').textContent = '(' + d.news_total + ')';
  const nb = document.getElementById('news-body');
  const ne = document.getElementById('news-empty');
  const keys = Object.keys(d.news);
  if (!keys.length) { nb.innerHTML = ''; ne.style.display = ''; }
  else {
    ne.style.display = 'none';
    const names = {}; d.thesis.forEach(t => names[t.key] = t.name);
    nb.innerHTML = keys.sort((a,b) => (d.news[b]||[]).length - (d.news[a]||[]).length).map(k => {
      const items = d.news[k] || [];
      const shown = items.slice(0,5);
      const more  = items.length - shown.length;
      return '<div class="news-group"><div class="news-asset">' + (names[k]||k) + ' <span class="cnt">(' + items.length + ')</span></div>'
        + shown.map(h => '<div class="news-item">' + (h.url ? '<a href="'+esc(h.url)+'" target="_blank" rel="noopener">'+esc(h.title.substring(0,85))+'</a>' : esc(h.title.substring(0,85))) + ' <span class="news-src">' + esc(h.source) + '</span></div>').join('')
        + (more > 0 ? '<div class="news-more">+' + more + ' more</div>' : '') + '</div>';
    }).join('');
  }

  // Unmatched
  if (d.unmatched.length) {
    document.getElementById('unmatched-card').style.display = '';
    document.getElementById('unmatched-count').textContent = '(' + d.unmatched.length + ')';
    document.getElementById('unmatched-body').innerHTML = d.unmatched.map(u => '<tr><td>'+u.country+'</td><td>'+esc(u.title)+'</td><td>'+u.date+'</td><td>'+u.time+'</td></tr>').join('');
  }
}

function stat(v, l) { return '<div class="stat"><div class="stat-val">'+v+'</div><div class="stat-label">'+l+'</div></div>'; }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

render(DATA);
</script>
</body>
</html>
